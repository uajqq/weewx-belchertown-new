[CheetahGenerator]

    search_list_extensions = user.belchertown.getData

    encoding = html_entities

    [[SummaryByMonth]]
        [[[NOAA_month]]]
            encoding = utf8
            template = NOAA/NOAA-YYYY-MM.txt.tmpl

    [[SummaryByYear]]
        [[[NOAA_year]]]
            encoding = utf8
            template = NOAA/NOAA-YYYY.txt.tmpl

    [[ToDate]]
        [[[weewx_data]]]
            encoding = utf8
            template = json/weewx_data.json.tmpl

        [[[Belchertown]]]
            template = js/belchertown.js.tmpl

        [[[BelchertownUtils]]]
            template = js/belchertown-utils.js.tmpl

        [[[BelchertownForecast]]]
            template = js/belchertown-forecast.js.tmpl

        [[[BelchertownMqtt]]]
            template = js/belchertown-mqtt.js.tmpl

        [[[BelchertownCharts]]]
            template = js/belchertown-charts.js.tmpl

        [[[home]]]
            template = index.html.tmpl

        [[[about]]]
            template = about/index.html.tmpl

        [[[charts]]]
            template = charts/index.html.tmpl

        [[[records]]]
            template = records/index.html.tmpl

        [[[reports]]]
            template = reports/index.html.tmpl

        [[[pi]]]
            template = pi/index.html.tmpl

        [[[kiosk]]]
            template = kiosk.html.tmpl

        [[[manifest]]]
            encoding = utf8
            template = manifest.json.tmpl


[CopyGenerator]


    copy_once = favicon.ico, images/*, json/index.html, js/index.html, js/responsive-menu.js, robots.txt

    copy_always = *.css


[Generators]
    generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator, user.belchertown.HighchartsJsonGenerator, user.belchertown.PostRenderMinifyGenerator
